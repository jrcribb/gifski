name: gifski
summary: gifski
description: |
   GIF encoder based on libimagequant (pngquant).
   Squeezes maximum possible quality from the awful
   GIF format. https://gif.ski

version: git
adopt-info: gifski

grade: stable
base: core22
confinement: strict

apps:
  gifski:
    command: bin/gifski
    plugs:
    - home
    - removable-media

parts:
  gifski:
    source: https://github.com/ImageOptim/gifski.git
    plugin: rust
    rust-features:
      - video
    override-pull: |
      craftctl default
      craftctl set version="$(git describe --tags --abbrev=0)"
    build-packages:
      - pkg-config
      - ffmpeg
      - libavcodec-dev
      - libavdevice-dev
      - libavfilter-dev
      - libavformat-dev
      - libavutil-dev
      - libswresample-dev
      - libswscale-dev
      - libclang-15-dev
      - libblas3
    stage-packages:
      - ffmpeg
      - freeglut3 # dep leak from one of ffmpeg dev libs?
      - libglu1-mesa
      - libblas3
    organize:
      # https://forum.snapcraft.io/t/snapcraft-succeeds-but-libblas-so-3-link-cant-be-found-at-runtime/24840/5
      usr/lib/*-linux-gnu/blas/*: usr/lib/
      usr/lib/*-linux-gnu/lapack/*: usr/lib/
